# Render IaC config — defines the web service for this Next.js + Prisma app.
#
# Apply by either:
#   1. Push this file to the connected GitHub repo. Render auto-detects
#      render.yaml and creates/updates the service on every push.
#   2. Render dashboard → New → "Blueprint" → pick this repo.
#
# After creation, set the secret env vars in the Render dashboard. The
# `envVars` block below LISTS them as `sync: false` (must be set in the UI)
# rather than committing secrets to git.
#
# Health check: the homepage. Render polls every 30s; service restarts
# automatically if the URL stops returning 200s.

services:
  - type: web
    name: shopify-analytics
    runtime: node
    plan: starter # 0.5 CPU / 512 MB — fine for one tenant; bump to standard for SaaS scale
    region: frankfurt # closest to Asia/Jerusalem; switch to oregon/ohio for US tenants
    branch: main
    # `prisma generate` runs before `next build` so the build sees the
    # generated client. `npx prisma db push` is intentionally NOT here —
    # schema migrations belong in a separate step you trigger manually
    # so a code push can't silently mutate production schema.
    # rm -rf the cached Prisma client forces a fresh generation on every
    # deploy. Without this, Render reuses the previous build's
    # node_modules/.prisma and a schema change can silently ship an
    # outdated client (db.systemConfig undefined etc.). Small extra cost
    # (~5s per build) but eliminates an entire class of "deployed code
    # references a model the client doesn't know about" bugs.
    #
    # `playwright install chromium` downloads the headless Chromium binary
    # used by the PDF renderer. Render's Node image doesn't ship with it.
    # Without this, every PDF export fails with "Executable doesn't exist
    # at /opt/render/.cache/ms-playwright/...".
    buildCommand: rm -rf node_modules/.prisma && npm ci && npx prisma generate && npx playwright install --with-deps chromium chromium-headless-shell && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true

    envVars:
      # ─── Runtime-managed (Render sets these automatically) ─────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

      # ─── Database (Supabase) ───────────────────────────────────────────
      # Pooled connection for the app. Use Supabase's POOLED endpoint
      # (port 6543) with ?pgbouncer=true&connection_limit=1.
      - key: DATABASE_URL
        sync: false
      # Direct connection for migrations only (`prisma db push`). Use the
      # Supabase DIRECT endpoint (port 5432).
      - key: DIRECT_URL
        sync: false

      # ─── App URL — required for OAuth callbacks + cron self-ping ───────
      # Set this to your Render service URL: https://shopify-analytics.onrender.com
      # (or your custom domain if you've mapped one).
      - key: APP_URL
        sync: false
      # Browser-exposed copy of APP_URL. The Settings → Shopify OAuth card
      # renders the callback URL from NEXT_PUBLIC_APP_URL (only NEXT_PUBLIC_*
      # vars reach the client bundle). Set it to the same value as APP_URL.
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ─── Supabase Auth (Phase 1) ───────────────────────────────────────
      # NEXT_PUBLIC_* keys are sent to the browser; server-only keys aren't.
      # Get these from Supabase Dashboard → Project Settings → API.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false

      # ─── Stripe Billing (Phase 2) ──────────────────────────────────────
      # Master switch. Off by default — the app runs without billing
      # (every signed-in org treated as paying customer on the Agency
      # tier, no trial banner / paywall). Flip to "true" once Stripe is
      # fully configured below.
      - key: BILLING_ENABLED
        value: "false"
      # Get from Stripe Dashboard → Developers → API keys. Use test keys
      # for dev (sk_test_...), live keys for production (sk_live_...).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Per-plan price IDs (Stripe Dashboard → Products → each price has
      # an ID like price_1AbCdEf...). Set the ones you've created; null
      # entries gracefully disable that plan/currency/interval combo.
      - key: STRIPE_PRICE_STARTER_ILS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_ILS_ANNUAL
        sync: false
      - key: STRIPE_PRICE_STARTER_USD_MONTHLY
        sync: false
      - key: STRIPE_PRICE_STARTER_USD_ANNUAL
        sync: false
      - key: STRIPE_PRICE_GROWTH_ILS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_GROWTH_ILS_ANNUAL
        sync: false
      - key: STRIPE_PRICE_GROWTH_USD_MONTHLY
        sync: false
      - key: STRIPE_PRICE_GROWTH_USD_ANNUAL
        sync: false
      - key: STRIPE_PRICE_AGENCY_ILS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_AGENCY_ILS_ANNUAL
        sync: false
      - key: STRIPE_PRICE_AGENCY_USD_MONTHLY
        sync: false
      - key: STRIPE_PRICE_AGENCY_USD_ANNUAL
        sync: false

      # ─── Shopify ───────────────────────────────────────────────────────
      - key: SHOPIFY_CREDENTIALS_ENCRYPTION_KEY
        generateValue: true # Render auto-generates a strong random value on first deploy
      - key: SHOPIFY_ADMIN_API_VERSION
        value: "2026-01"
      - key: SHOPIFY_WEBHOOK_SECRET
        sync: false
      - key: SHOPIFY_CLIENTID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_OAUTH_SCOPES
        value: "read_products,read_orders,read_customers,read_inventory,read_customer_journey"

      # ─── Meta Ads ──────────────────────────────────────────────────────
      - key: META_ADS_CLIENT_ID
        sync: false
      - key: META_ADS_CLIENT_SECRET
        sync: false
      - key: META_ADS_BRAND_RULES
        sync: false

      # ─── Reports (Resend + OpenAI) ─────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: REPORT_FROM_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # ─── Creative Studio AI providers (optional, set what you use) ─────
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: HIGGSFIELD_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Per-org daily cap on creative generation jobs (SA-MED-05). Every
      # provider call costs money; the runner rejects an org's jobs once it
      # has run this many in a UTC day ("Daily creative job limit reached").
      # Default 10 if unset. Raise for high-volume orgs; lower to throttle spend.
      - key: CREATIVE_MAX_JOBS_PER_DAY
        value: "10"

      # ─── Creative Studio storage (R2 / S3 for production) ──────────────
      # In production the "local" backend won't survive container restarts —
      # set CREATIVE_STORAGE_BACKEND="s3" (or "r2") and fill in the rest.
      - key: CREATIVE_STORAGE_BACKEND
        value: s3
      - key: CREATIVE_BUCKET
        sync: false
      - key: CREATIVE_S3_ENDPOINT
        sync: false
      - key: CREATIVE_S3_REGION
        value: auto
      - key: CREATIVE_S3_ACCESS_KEY_ID
        sync: false
      - key: CREATIVE_S3_SECRET_ACCESS_KEY
        sync: false
      - key: CREATIVE_WORKER_SECRET
        generateValue: true

      # ─── Cron auth (CRIT-07) ───────────────────────────────────────────
      # Shared secret that gates every /api/cron/* route (middleware.ts).
      # When set, requests must carry a matching `x-cron-secret` header; the
      # in-process self-fetch crons attach it automatically. REQUIRED in
      # production — without it, anyone on the internet can trigger a full
      # sync / email blast. Generate any long random string.
      - key: CRON_SECRET
        generateValue: true

      # ─── Background crons (all ON by default in production via cron-util)
      # Leaving these unset means they run automatically because NODE_ENV=production.
      # Use *_DISABLED=1 in the dashboard if you ever need to kill one quickly.
      # Data-refresh cron: 2h default. Override here to dial up/down per
      # store load (e.g. "3600000" for hourly on a high-volume tenant).
      - key: DATA_REFRESH_CRON_MS
        value: "7200000"
      # ─── Optional cron / provider tuning overrides ─────────────────────
      # All of the following have safe in-code defaults — set only to override.
      # Cron intervals (ms) and self-ping URLs: SHOPIFY_SYNC_CRON_MS,
      #   SHOPIFY_SYNC_CRON_URL, CREATIVE_JOB_CRON_MS, CREATIVE_JOB_CRON_URL,
      #   WEEKLY_REPORT_CRON_MS, WEEKLY_REPORT_CRON_URL, DATA_REFRESH_CRON_URL,
      #   OUTCOME_MEASUREMENT_CRON_MS, OUTCOME_MEASUREMENT_CRON_URL,
      #   SHOPIFY_SYNC_STALE_THRESHOLD_MIN, ENABLE_SHOPIFY_SYNC_CRON.
      # Creative provider/model overrides: CREATIVE_MAX_JOBS_PER_DAY (see below),
      #   CREATIVE_IMAGE_MODEL_DEFAULT, CREATIVE_IMAGE_MODEL_FAST,
      #   CREATIVE_VIDEO_MODEL_DEFAULT, CREATIVE_VIDEO_ENABLED,
      #   CREATIVE_MAX_VIDEO_BATCH, CREATIVE_BATCH_QUALITY,
      #   CREATIVE_PROVIDER_CONCURRENCY, CREATIVE_STORAGE_LOCAL_DIR,
      #   OPENAI_API_BASE_URL, OPENAI_ORG_ID, OPENAI_IMAGE_MODEL,
      #   OPENAI_IMAGE_QUALITY, GEMINI_API_BASE_URL, NANOBANANA_MODEL,
      #   HIGGSFIELD_API_BASE_URL, HIGGSFIELD_IMAGE_MODEL, HIGGSFIELD_VIDEO_MODEL.
      # Other optional: FLASHY_ACCOUNT_IDS_JSON (multi-account override of
      #   FLASHY_ACCOUNT_ID), GROWTH_AGENT_PRODUCT_CRAWLER_DEFAULT_URLS,
      #   GROWTH_AGENT_PRODUCT_CRAWLER_USER_AGENT.

      # ─── Flashy (optional) ─────────────────────────────────────────────
      - key: FLASHY_ACCOUNT_ID
        sync: false

      # ─── Observability (Phase 4) ───────────────────────────────────────
      # Sentry DSN — server-side and edge. NEXT_PUBLIC_SENTRY_DSN is the
      # browser variant (same DSN, different env var because only NEXT_PUBLIC_*
      # is exposed to the browser bundle).
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      # Plausible — domain name + script URL (defaults to plausible.io).
      # Self-hosted Plausible: override NEXT_PUBLIC_PLAUSIBLE_SCRIPT.
      - key: NEXT_PUBLIC_PLAUSIBLE_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_PLAUSIBLE_SCRIPT
        sync: false
